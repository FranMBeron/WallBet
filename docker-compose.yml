services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wallbet
      POSTGRES_USER: wallbet
      POSTGRES_PASSWORD: wallbet
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
